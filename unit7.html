<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit 7: Trips | Full Marks with Luma</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page unit-page" data-unit-id="7">
      <header class="header-card">
        <div class="sub-row" style="width: 100%;">
          <a class="home-link" href="index.html">العودة للرئيسية</a>

      <section class="quiz-card">

          <img src="assets/luma.svg" alt="Luma" width="64" height="74" />

<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بنك أسئلة الاختبارات المركزية</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Tajawal:wght@400;500;700;800&display=swap');

      :root {
        --violet: #8d77d8;
        --violet-dark: #5f4bb2;
        --mint: #b7dcd1;
        --ink: #5b7381;
        --panel: #efeff1;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Tajawal', sans-serif;
        background: #f2f2f4;
        color: var(--ink);
        min-height: 100vh;
        padding: 10px;
      }

      .app {
        max-width: 1160px;
        margin: 0 auto;
        background: var(--panel);
        border: 4px solid #d8c7f6;
        border-radius: 28px;
        padding: 20px;
      }

      .title {
        margin: 0;
        color: var(--violet-dark);
        font-family: 'Baloo 2', cursive;
        font-size: clamp(2rem, 5vw, 3.6rem);
      }

      .top-hero {
        display: grid;
        grid-template-columns: 1fr 210px;
        gap: 14px;
        align-items: center;
        margin-bottom: 4px;
      }

      .hero-text {
        text-align: center;
      }

      .hero-girl {
        width: 100%;
        max-width: 210px;
        border-radius: 26px;
        border: 4px solid #ccb7f2;
        box-shadow: 0 10px 20px rgba(96, 75, 178, 0.18);
        object-fit: cover;
        aspect-ratio: 4 / 5;
      }

      .subtitle {
        text-align: center;
        margin: 8px 0 14px;
        font-size: clamp(1.2rem, 2.8vw, 2rem);
        font-weight: 800;
      }

      .score-bar {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .score-pill {
        border: 4px solid #d8c7f6;
        border-radius: 999px;
        padding: 8px 20px;
        font-size: clamp(1.3rem, 2.7vw, 2rem);
        color: var(--violet-dark);
        font-weight: 800;
        font-family: 'Baloo 2', cursive;
        background: #ece7f7;
      }

      .section-title {
        margin: 14px 0 10px;
        font-size: clamp(1.9rem, 3.6vw, 3rem);
        font-weight: 800;
        color: #607786;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .btn {
        border: 4px solid #bca5ef;
        border-radius: 28px;
        background: #f5f4f8;
        color: #5b49a7;
        padding: 16px 12px;
        font-family: 'Baloo 2', cursive;
        font-size: clamp(1.2rem, 2.4vw, 2rem);
        font-weight: 800;
        text-align: center;
        cursor: pointer;
      }

      .btn.small {
        font-size: clamp(1rem, 1.8vw, 1.5rem);
      }

      .btn.active {
        background: #dfe6f5;
        border-color: #9a7fe2;
      }

      .general-btn {
        width: 100%;
        margin: 8px 0 2px;
        border-color: #abd3c7;
        color: #2d7f72;
        background: #d9ece6;
      }

      .box {
        border: 4px solid #ccb7f2;
        border-radius: 30px;
        background: #f7f6f8;
        padding: 16px;
      }

      .qtext {
        font-size: clamp(1.15rem, 2vw, 1.7rem);
        line-height: 1.8;
        color: #607786;
        font-weight: 700;
      }

      .answers {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .ans {
        border: 3px solid #c9b4f0;
        border-radius: 18px;
        padding: 10px;
        background: #fff;
        color: #4b6390;
        text-align: right;
        font-weight: 700;
        cursor: pointer;
        font-size: clamp(1rem, 1.8vw, 1.35rem);
      }

      .ans:hover { background: #f5efff; }
      .ans.correct { border-color: #3ea873; background: #eafff3; }
      .ans.wrong { border-color: #d2617a; background: #fff0f4; }

      .feedback {
        min-height: 90px;
        margin-top: 14px;
        font-size: clamp(1rem, 1.8vw, 1.35rem);
        line-height: 1.8;
        font-weight: 700;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .credits {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .credit-card {
        border: 4px solid #ccb7f2;
        border-radius: 24px;
        padding: 12px;
        text-align: center;
        background: #f7f6f8;
      }

      .credit-label {
        margin: 0 0 6px;
        color: #6f8290;
        font-size: clamp(1rem, 1.9vw, 1.35rem);
        font-weight: 800;
      }

      .credit-name {
        margin: 0;
        color: #5f4bb2;
        font-size: clamp(1.2rem, 2.2vw, 1.7rem);
        font-family: 'Baloo 2', cursive;
        font-weight: 800;
      }

      @media (max-width: 1024px) {
        .app { padding: 16px; }
        .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 640px) {
        body { padding: 6px; }
        .app { border-radius: 20px; padding: 12px; }
        .grid-3 { grid-template-columns: 1fr; }
        .section-title { text-align: center; }
        .top-hero {
          grid-template-columns: 1fr;
          justify-items: center;
        }
        .credits {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="top-hero">
        <div class="hero-text">
          <h1 class="title">بنك أسئلة الاختبارات المركزية</h1>
          <p class="subtitle">الوحدات 5 و6 و7 | بنك أسئلة شامل + تصحيح فوري</p>
        </div>
        <img class="hero-girl" src="assets/girl-drawn.svg" alt="Girl character illustration" />
      </div>

      <div class="score-bar">
        <div class="score-pill">صح: <span id="correctCount">0</span></div>
        <div class="score-pill">أسئلة: <span id="totalCount">0</span></div>
      </div>

      <h2 class="section-title">اختاري الوحدة</h2>
      <div class="grid-3" id="units">
        <button class="btn" data-unit="7">Unit 7<br/>Trips</button>
        <button class="btn" data-unit="6">Unit 6<br/>Outdoor Activities</button>
        <button class="btn" data-unit="5">Unit 5<br/>Storylines</button>
      </div>

      <h2 class="section-title">General Questions (لحالها)</h2>
      <button class="btn general-btn" data-cat="general">General Questions | أسئلة عامة</button>

      <h2 class="section-title">باقي الأقسام</h2>
      <div class="grid-3" id="cats">
        <button class="btn small" data-cat="composition">Guided Composition</button>
        <button class="btn small" data-cat="grammar">Grammar</button>
        <button class="btn small" data-cat="vocab">Vocabulary + Controlled Writing</button>
      </div>

      <h2 class="section-title">السؤال</h2>
      <section class="box" id="questionBox">
        <div class="qtext" id="questionText">اختاري الوحدة ثم الفئة للبدء...</div>
        <div class="answers" id="answers"></div>
      </section>

      <h2 class="section-title">إجابتك والتصحيح</h2>
      <section class="box feedback" id="feedback">جاهزة؟ اختاري إجابة من الخيارات 👏</section>

      <div class="actions">
        <button class="btn small" id="newQBtn">سؤال جديد</button>
      </div>

      <section class="credits">
        <article class="credit-card">
          <p class="credit-label">المنفذة</p>
          <p class="credit-name">هند اللهيبي</p>
        </article>
        <article class="credit-card">
          <p class="credit-label">مديرة المدرسة</p>
          <p class="credit-name">عبير الحربي</p>
        </article>
      </section>
    </main>

    <script>

          ],
          grammar: [
            { q: 'I ___ watching a movie.', options: ['was', 'were', 'is', 'are'], a: 0, why: 'I + was + verb-ing.' },
            { q: 'They ___ screaming during the movie.', options: ['were', 'was', 'is', 'am'], a: 0, why: 'They + were.' },
            { q: 'She ___ not watching a play.', options: ['was', 'were', 'is', 'are'], a: 0, why: 'She + was not.' },
            { q: '___ you enjoying the cartoon?', options: ['Were', 'Was', 'Is', 'Do'], a: 0, why: 'Question with you uses were.' },
            { q: 'How about ___ a horror movie?', options: ['seeing', 'see', 'saw', 'sees'], a: 0, why: 'How about + verb-ing.' },
            { q: "Why don't we ___ a musical?", options: ['choose', 'choosing', 'chose', 'chooses'], a: 0, why: "Why don't we + base verb." },
            { q: 'They were (watch) a play.', options: ['watching', 'watch', 'watched', 'watches'], a: 0, why: 'Past continuous needs verb-ing.' },
            { q: 'Adam (were) acting in a sci-fi movie.', options: ['was', 'were', 'is', 'are'], a: 0, why: 'Adam is singular: was.' },
            { q: 'Order: You / were / covering / your / ears', options: ['You were covering your ears.', 'You covering were your ears.', 'Were you covering ears your.', 'Your ears were you covering.'], a: 0, why: 'Correct subject + be + verb-ing order.' }
          ],
          composition: [
            { q: 'Best opening for movie scene paragraph:', options: ['My favorite scene is from an animation movie.', 'Passport is in my bag.', 'I wear helmet in train.', 'The taxi took off.'], a: 0, why: 'This is a correct composition starter.' },

        },
        6: {
          general: [
            { q: 'What activities do you do outside?', options: ['I go hiking and camping.', 'I check in and check out.', 'I use passport and taxi.', 'I depart from platform.'], a: 0, why: 'Hiking/camping are outdoor activities.' },
            { q: 'Which activities do you want to try?', options: ['I want to try rafting because it is exciting.', 'I want to try suitcase.', 'I want to try terminal.', 'I want to try security.'], a: 0, why: 'Rafting is a correct activity.' },
            { q: 'What is your worst fear?', options: ['My worst fear is high cliffs.', 'My fear is passport.', 'My fear is grammar.', 'My fear is station.'], a: 0, why: 'Cliffs are related to outdoor danger.' },
            { q: 'What is a cliff?', options: ['A high edge where land drops down.', 'A train ticket.', 'A travel bag.', 'A story type.'], a: 0, why: 'Correct meaning of cliff.' },

          ],
          vocab: [

            { q: 'Protection while cycling:', options: ['helmet', 'passport', 'suitcase', 'ticket'], a: 0, why: 'Helmet protects the head.' },
            { q: 'Odd word: canoe – outdoors – helmet – surfboard', options: ['outdoors', 'canoe', 'helmet', 'surfboard'], a: 0, why: 'Outdoors is not an item like others.' },
            { q: 'Sleeping outdoors activity:', options: ['camping', 'fishing', 'surfing', 'climbing'], a: 0, why: 'Camping means staying outdoors.' },
            { q: 'Needed for mountain biking:', options: ['bike and helmet', 'passport and ticket', 'storyboard and plot', 'taxi and platform'], a: 0, why: 'Correct equipment for biking.' },
            { q: 'Campsite cooking usually uses:', options: ['campfire', 'runway', 'terminal', 'security'], a: 0, why: 'Campfire is used in camping.' },
            { q: 'Canoeing needs a:', options: ['canoe', 'train', 'documentary', 'station'], a: 0, why: 'Canoeing uses a canoe.' }
          ],
          grammar: [
            { q: 'They ___ hiking in the forest.', options: ['were', 'was', 'is', 'am'], a: 0, why: 'They + were.' },
            { q: 'While I was hiking, I ___ a snake.', options: ['saw', 'see', 'seen', 'seeing'], a: 0, why: 'Short action in past simple: saw.' },
            { q: 'When they ___, they set up tents.', options: ['arrived', 'arriving', 'arrive', 'arrives'], a: 0, why: 'Past simple: arrived.' },
            { q: 'Dad was lighting campfire ___ I was fishing.', options: ['while', 'when', 'do', 'did'], a: 0, why: 'Two long actions use while.' },
            { q: 'I was looking at water when sandwich ___.', options: ['fell', 'falling', 'falls', 'is falling'], a: 0, why: 'Short interrupting action = fell.' },
            { q: 'I didn’t (knew) what to do.', options: ['know', 'knew', 'knowing', 'known'], a: 0, why: 'After did not use base verb.' },
            { q: 'I ___ a bear last weekend.', options: ['saw', 'seeing', 'see', 'seen'], a: 0, why: 'Past simple: saw.' },
            { q: 'While they ___, rain started.', options: ['were canoeing', 'canoeing', 'canoed', 'are canoeing'], a: 0, why: 'Long action uses past continuous.' },
            { q: 'Dad didn’t ___ a shark when surfing.', options: ['see', 'saw', 'seen', 'seeing'], a: 0, why: 'After didn’t use base verb.' }
          ],
          composition: [
            { q: 'Best sentence for safety paragraph:', options: ["It's important to be safe in outdoor activities.", 'I has went outside.', 'Passport is climbing.', 'Taxi is helmet.'], a: 0, why: 'Correct useful expression.' },
            { q: 'Correct useful expression:', options: ['You should wear a helmet.', 'You should wore helmet.', 'You should wearing helmet.', 'You should wears helmet.'], a: 0, why: 'You should + base verb.' },
            { q: 'Correct while sentence:', options: ['While I was hiking, I stayed on the path.', 'While I hiking, I stayed path.', 'While I was hike, I stay path.', 'While I was hiked, I staying path.'], a: 0, why: 'Correct past continuous structure.' }
          ]
        },
        7: {
          general: [
            { q: 'Different ways to travel include:', options: ['taxi, train, airplane', 'helmet, tent, raft', 'plot, climax, ending', 'campfire, hotdog, forest'], a: 0, why: 'These are means of transportation.' },
            { q: 'Favorite way to travel and why:', options: ['I like planes because they are fast.', 'I like passport because it flies.', 'I like station because it swims.', 'I like cliff because it drives.'], a: 0, why: 'Plane is a travel method with reason.' },

      const unitBtns = [...document.querySelectorAll('[data-unit]')];
      const catBtns = [...document.querySelectorAll('[data-cat]')];
      const qText = document.getElementById('questionText');
      const answersEl = document.getElementById('answers');
      const feedbackEl = document.getElementById('feedback');
      const newQBtn = document.getElementById('newQBtn');
      const correctEl = document.getElementById('correctCount');
      const totalEl = document.getElementById('totalCount');

      let selectedUnit = null;
      let selectedCat = null;
      let currentQuestion = null;
      let answered = false;
      let correct = 0;
      let total = 0;
      const used = {};

      function markActive(btns, current) {
        btns.forEach((b) => b.classList.toggle('active', b === current));
      }

      function poolKey() {
        return `${selectedUnit}-${selectedCat}`;
      }

      function nextQuestion() {
        if (!selectedUnit || !selectedCat) {
          feedbackEl.textContent = 'اختاري الوحدة والفئة أولاً.';
          return;
        }

        const arr = bank[selectedUnit][selectedCat];
        if (!arr || arr.length === 0) {
          feedbackEl.textContent = 'لا توجد أسئلة حالياً في هذا القسم.';
          return;
        }

        const key = poolKey();
        if (!used[key] || used[key].length >= arr.length) {
          used[key] = [];
        }

        const available = arr.map((_, i) => i).filter((i) => !used[key].includes(i));
        const idx = available[Math.floor(Math.random() * available.length)];
        used[key].push(idx);

        currentQuestion = arr[idx];
        answered = false;
        qText.textContent = currentQuestion.q;
        feedbackEl.textContent = 'اختاري الإجابة الصحيحة من الخيارات 👇';
        renderOptions(currentQuestion.options);
      }

      function renderOptions(options) {
        answersEl.innerHTML = '';
        options.forEach((opt, i) => {
          const b = document.createElement('button');
          b.className = 'ans';
          b.textContent = opt;
          b.addEventListener('click', () => choose(i, b));
          answersEl.appendChild(b);
        });
      }

      function choose(i, btnEl) {
        if (!currentQuestion || answered) return;
        answered = true;
        total += 1;
        totalEl.textContent = String(total);

        const all = [...answersEl.querySelectorAll('.ans')];
        all.forEach((b, idx) => {
          b.disabled = true;
          if (idx === currentQuestion.a) b.classList.add('correct');
        });

        if (i === currentQuestion.a) {
          correct += 1;
          correctEl.textContent = String(correct);
          btnEl.classList.add('correct');
          feedbackEl.textContent = `أحسنت! ✓ Great job!\nالإجابة صحيحة. السبب: ${currentQuestion.why}`;
        } else {
          btnEl.classList.add('wrong');
          feedbackEl.textContent = `حاول مرة أخرى ✗\nCorrect answer: ${currentQuestion.options[currentQuestion.a]}\nالسبب: ${currentQuestion.why}`;
        }
      }

      unitBtns.forEach((b) => {
        b.addEventListener('click', () => {
          selectedUnit = Number(b.dataset.unit);
          markActive(unitBtns, b);
          if (selectedCat) nextQuestion();
        });
      });

      catBtns.forEach((b) => {
        b.addEventListener('click', () => {
          selectedCat = b.dataset.cat;
          markActive(catBtns, b);
          if (selectedUnit) nextQuestion();
        });
      });

      newQBtn.addEventListener('click', nextQuestion);
    </script>
  </body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مساعد المراجعة | Full Marks with Luma</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .assistant-wrap {
        max-width: 820px;
        margin: 0 auto;
      }

      .assistant-header {
        margin-bottom: 14px;
      }

      .assistant-box {
        background: #fffdfc;
        border: 2px solid #e9d8ff;
        border-radius: 22px;
        box-shadow: 0 12px 24px rgba(109, 91, 157, 0.14);
        padding: 16px;
      }

      .assistant-title {
        margin: 0 0 8px;
        text-align: center;
        font-family: 'Baloo 2', cursive;
        color: #6b57c3;
        font-size: clamp(1.4rem, 3vw, 2rem);
      }

      .assistant-sub {
        margin: 0 0 14px;
        text-align: center;
        color: #607b8a;
        font-weight: 700;
      }

      .score-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .score-item {
        background: #f7ecff;
        color: #6a57b8;
        border: 2px solid #ead8ff;
        border-radius: 999px;
        padding: 7px 14px;
        font-weight: 800;
      }

      .assistant-label {
        margin: 12px 0 8px;
        font-weight: 800;
        color: #5b7280;
      }

      .unit-grid,
      .cat-grid {
        display: grid;
        gap: 10px;
      }

      .unit-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .general-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .cat-grid {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .assistant-btn {
        border: 2px solid #d7c5ff;
        border-radius: 14px;
        background: #fff;
        color: #5f4fa6;
        padding: 10px;
        cursor: pointer;
        font-weight: 800;
        font-family: 'Baloo 2', cursive;
      }

      .assistant-btn:hover {
        background: #faf4ff;
      }

      .assistant-btn.active {
        background: linear-gradient(145deg, #efe1ff 0%, #e8f4ff 100%);
        border-color: #a688e8;
      }

      .assistant-btn.general-alone {
        border-color: #c4e7db;
        color: #2f7b6f;
        background: #f2fffb;
      }

      .assistant-btn.general-alone.active {
        background: linear-gradient(145deg, #dcfff3 0%, #e8f4ff 100%);
        border-color: #7dcbb8;
      }

      .q-area,
      .chat-area {
        border: 2px solid #e2d0ff;
        border-radius: 14px;
        background: #fff;
        padding: 12px;
      }

      .q-area {
        min-height: 96px;
      }

      .q-en {
        direction: ltr;
        text-align: left;
        color: #2f4958;
        line-height: 1.7;
        font-weight: 700;
      }

      .q-ar {
        margin-top: 6px;
        color: #6f8793;
        line-height: 1.7;
      }

      .chat-area {
        min-height: 88px;
      }

      .msg {
        border-radius: 12px;
        padding: 9px 10px;
        margin-bottom: 8px;
        line-height: 1.6;
        white-space: pre-line;
      }

      .msg.student {
        background: #f6edff;
        color: #513f98;
        text-align: right;
      }

      .msg.ai {
        background: #eef8ff;
        color: #35596d;
        text-align: right;
      }

      .input-row {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
      }

      .input-row input {
        border: 2px solid #ddcdfc;
        border-radius: 12px;
        padding: 10px;
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
      }

      .hint {
        margin-top: 10px;
        text-align: center;
        color: #8197a2;
        font-weight: 700;
      }

      @media (max-width: 640px) {
        .input-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page assistant-wrap">
      <header class="header-card assistant-header">
        <div class="sub-row" style="width: 100%;">
          <a class="home-link" href="index.html">العودة للرئيسية</a>
          <h1 class="page-title">مساعد مراجعة اللغة الإنجليزية</h1>
          <img src="assets/ministry-logo.svg" alt="Ministry of Education logo" width="170" height="44" />
        </div>
      </header>

      <section class="assistant-box">
        <h2 class="assistant-title">Top Goal 2 – Part 2</h2>
        <p class="assistant-sub">الوحدات 5 و6 و7 | بنك أسئلة شامل + تصحيح فوري</p>

        <div class="score-bar">
          <div class="score-item">صح: <span id="correct">0</span></div>
          <div class="score-item">أسئلة: <span id="total">0</span></div>
        </div>

        <p class="assistant-label">اختاري الوحدة</p>
        <div class="unit-grid" id="unit-grid">
          <button class="assistant-btn unit-btn" data-unit="5">Unit 5<br />Storylines</button>
          <button class="assistant-btn unit-btn" data-unit="6">Unit 6<br />Outdoor Activities</button>
          <button class="assistant-btn unit-btn" data-unit="7">Unit 7<br />Trips</button>
        </div>

        <p class="assistant-label">General Questions (لحالها)</p>
        <div class="general-row">
          <button class="assistant-btn cat-btn general-alone" data-cat="general">General Questions | أسئلة عامة</button>
        </div>

        <p class="assistant-label">باقي الأقسام</p>
        <div class="cat-grid">
          <button class="assistant-btn cat-btn" data-cat="vocab">Vocabulary + Controlled Writing</button>
          <button class="assistant-btn cat-btn" data-cat="grammar">Grammar</button>
          <button class="assistant-btn cat-btn" data-cat="composition">Guided Composition</button>
        </div>

        <p class="assistant-label">السؤال</p>
        <div class="q-area" id="qarea">
          <p class="q-ar">اختاري الوحدة ثم الفئة للبدء...</p>
        </div>

        <p class="assistant-label">إجابتك والتصحيح</p>
        <div class="chat-area" id="chatarea"></div>

        <div class="input-row">
          <input id="userinput" type="text" placeholder="اكتب إجابتك هنا..." />
          <button class="assistant-btn" id="sendbtn" disabled>إرسال</button>
          <button class="assistant-btn" id="nextbtn">سؤال جديد</button>
        </div>

        <p class="hint" id="hint">اختاري الوحدة أولاً ثم نوع السؤال 🌟</p>
      </section>
    </div>

    <script>
      const bank = {
        5: {
          name: 'Storylines',
          general: [
            { q: 'What is your favorite kind of story?', ar: 'ما هو نوع القصة المفضل لديك؟' },
            { q: "What were you doing at 6 o'clock yesterday?", ar: 'ماذا كنت تفعل في الساعة 6 أمس؟' },
            { q: 'Who is your favorite story character? Why do you like him/her?', ar: 'من شخصيتك المفضلة في القصة؟ ولماذا؟' },
            { q: 'What kinds of stories do you dislike? Why?', ar: 'ما أنواع القصص التي لا تحبها؟ ولماذا؟' },
            { q: 'What are the people in stories called?', ar: 'ماذا يُسمّى الأشخاص في القصة؟', expected: ['characters'] },
            { q: 'Do you have a favorite story? Which is it?', ar: 'هل لديك قصة مفضلة؟ ما هي؟' },
            { q: 'What two events happen in the third act of a story?', ar: 'ما الحدثان في الفصل الثالث من القصة؟', expected: ['climax and resolution', 'climax, resolution'] },
            { q: 'What can you draw to plan a story?', ar: 'ما الذي يمكنك رسمه لتخطيط قصة؟', expected: ['storyboard'] }
          ],
          vocab: [
            { q: 'What type of story creates a feeling of fear?', ar: 'ما نوع القصة التي تخلق شعور الخوف؟', expected: ['horror'] },
            { q: 'What type of story makes people laugh?', ar: 'ما نوع القصة التي تُضحك الناس؟', expected: ['comedy'] },
            { q: 'A story about an invented future or space is called _____.', ar: 'قصة عن مستقبل مخترع أو الفضاء تسمى؟', expected: ['sci-fi', 'science fiction'] },
            { q: 'Circle the odd word: cartoon – school – fairy tale – mystery', ar: 'اختاري الكلمة الشاذة', expected: ['school'] },
            { q: "What does 'whisper' mean?", ar: 'ما معنى whisper؟', expected: ['speak quietly', 'talk quietly', 'يهمس'] },
            { q: "What is the opposite of 'beginning'?", ar: 'ما عكس beginning؟', expected: ['ending'] },
            { q: 'Circle the odd word: love – like – hate – whisper', ar: 'اختاري الكلمة الشاذة', expected: ['whisper'] },
            { q: 'It is a movie about real people or facts. What is it?', ar: 'فيلم عن أشخاص حقيقيين أو حقائق، ما نوعه؟', expected: ['documentary'] },
            { q: 'In this kind of story, a detective solves a crime.', ar: 'في هذا النوع يحل المحقق جريمة، ما النوع؟', expected: ['mystery'] },
            { q: 'It is an exciting story full of action.', ar: 'قصة مشوقة مليئة بالأحداث، ما النوع؟', expected: ['thriller'] }
          ],
          grammar: [
            { q: 'Choose: I (was / were / is / are) watching a movie.', ar: 'اختاري الصحيح', expected: ['was'] },
            { q: 'Choose: They (was / were / is / am) screaming during the horror movie.', ar: 'اختاري الصحيح', expected: ['were'] },
            { q: 'Choose: We (was / were / is / am) not singing in the musical.', ar: 'اختاري الصحيح', expected: ['were'] },
            { q: 'Choose: She (was / were / is / are) not watching a play.', ar: 'اختاري الصحيح', expected: ['was'] },
            { q: 'Choose: (Was / Were / Is / Does) you enjoying the cartoon?', ar: 'اختاري الصحيح', expected: ['were'] },
            { q: 'Choose: Why (was / were / do / does) he acting in a western?', ar: 'اختاري الصحيح', expected: ['was'] },
            { q: 'Change to negative: They were watching a movie.', ar: 'حوّلي الجملة للنفي', expected: ["they weren't watching a movie", 'they were not watching a movie'] },
            { q: 'Order the words: were / covering / your / You / ears', ar: 'رتبي الكلمات', expected: ['you were covering your ears'] },
            { q: 'Correct: They were (watch) a play.', ar: 'صححي الكلمة', expected: ['watching'] },
            { q: 'Correct: How about (see) a horror movie?', ar: 'صححي الفعل', expected: ['seeing'] },
            { q: "What about (watch / watching / watched / watches) a movie?", ar: 'اختاري الصحيح', expected: ['watching'] },
            { q: "How about (see / seeing / saw / sees) a horror movie?", ar: 'اختاري الصحيح', expected: ['seeing'] },
            { q: "Why don't we (choose / choosing / chose / chooses) a musical?", ar: 'اختاري الصحيح', expected: ['choose'] },
            { q: 'Order: Why / don’t / we / work / on / our / storyboard / ?', ar: 'رتبي الجملة', expected: ["why don't we work on our storyboard"] },
            { q: 'Correct: Adam (were) acting in a sci-fi movie.', ar: 'صححي الخطأ', expected: ['was'] }
          ],
          composition: [
            { q: 'Write 3 sentences about your favorite movie scene using: What I loved was... and The great thing about...', ar: 'اكتبي 3 جمل عن مشهدك المفضل باستخدام العبارات المطلوبة.' },
            { q: 'Write a short paragraph: What movie? what type? what happens? what you like/dislike?', ar: 'اكتبي فقرة قصيرة وفق الأسئلة الموجهة.' }
          ]
        },
        6: {
          name: 'Outdoor Activities',
          general: [
            { q: 'What activities do you do outside?', ar: 'ما الأنشطة التي تمارسينها في الخارج؟' },
            { q: 'Which activities do you want to try? Why?', ar: 'ما الأنشطة التي تريدين تجربتها؟ ولماذا؟' },
            { q: 'What is your worst fear?', ar: 'ما أشد مخاوفك؟' },
            { q: 'What do you know about safety in outdoor activities?', ar: 'ماذا تعرفين عن السلامة في الأنشطة الخارجية؟' },
            { q: 'Do you prefer activities outdoors or at home? Why?', ar: 'هل تفضلين الأنشطة الخارجية أم المنزلية؟ ولماذا؟' },
            { q: 'What is a cliff?', ar: 'ما معنى cliff؟', expected: ['a high rock edge', 'high edge', 'جرف'] },
            { q: 'Things we need for rafting?', ar: 'ما الأشياء التي نحتاجها للتجديف؟' },
            { q: 'The opposite of outdoor is ...', ar: 'عكس outdoor هو ...', expected: ['indoor', 'indoors'] }
          ],
          vocab: [
            { q: 'Name 3 things you need for rafting.', ar: 'اذكري 3 أشياء للتجديف.' },
            { q: 'Circle the odd word: hiking – camping – tent – fishing', ar: 'اختاري الكلمة الشاذة', expected: ['tent'] },
            { q: 'Two water activities: ___ and ___', ar: 'اذكري نشاطين مائيين.' },
            { q: 'One activity that involves long walks is ___', ar: 'نشاط فيه مشي طويل هو ...', expected: ['hiking', 'backpacking'] },
            { q: 'What equipment do you wear for protection while cycling?', ar: 'ما معدات الحماية أثناء ركوب الدراجة؟', expected: ['helmet'] },
            { q: "What is the opposite of 'outdoors'?", ar: 'ما عكس outdoors؟', expected: ['indoors'] },
            { q: 'Circle the odd word: canoe – outdoors – helmet – surfboard', ar: 'اختاري الكلمة الشاذة', expected: ['outdoors'] },
            { q: 'One activity that involves sleeping outdoors is ___', ar: 'نشاط يتضمن النوم في الخارج هو ...', expected: ['camping'] },
            { q: 'What do you need for mountain biking?', ar: 'ماذا تحتاجين لركوب الدراجة الجبلية؟' },
            { q: 'Match idea: camping → ?', ar: 'مطابقة: camping تحتاج ...', expected: ['tent'] }
          ],
          grammar: [
            { q: 'Choose: They (am / is / were / was) hiking in the forest.', ar: 'اختاري الصحيح', expected: ['were'] },
            { q: 'Fill in: While I was hiking, I ___ (see) a snake.', ar: 'أكملي بالفعل الصحيح', expected: ['saw'] },
            { q: "Give an example using while/when.", ar: 'أعطي مثالاً باستخدام while أو when.' },
            { q: 'Order: We / were / sleeping / in / a tent / for / four days', ar: 'رتبي الكلمات', expected: ['we were sleeping in a tent for four days'] },
            { q: "Correct: I didn't know what (knew) to do.", ar: 'صححي الكلمة', expected: ['know'] },
            { q: 'Choose: I (saw / seeing) a bear in the forest last weekend.', ar: 'اختاري الصحيح', expected: ['saw'] },
            { q: 'Choose: When they (arriving / arrived), they set up the tents.', ar: 'اختاري الصحيح', expected: ['arrived'] },
            { q: 'Fill in: Dad was lighting the campfire ___ I was fishing. (while/when)', ar: 'أكملي while/when', expected: ['while'] },
            { q: 'Correct: (While) they arrived, they set up the tents.', ar: 'صححي أداة الربط', expected: ['when'] },
            { q: 'Choose: I was looking at the water when my sandwich (fell / falling) in.', ar: 'اختاري الصحيح', expected: ['fell'] },
            { q: 'Choose: The kids (were swimming / swam) but had to stop to eat.', ar: 'اختاري الصحيح', expected: ['were swimming'] },
            { q: 'Choose: Dad didn’t (see / saw) a shark when he was surfing.', ar: 'اختاري الصحيح', expected: ['see'] }
          ],
          composition: [
            { q: "Write 3–4 sentences about outdoor safety using: It's important to..., While I was..., You should...", ar: 'اكتبي 3-4 جمل عن السلامة باستخدام العبارات المطلوبة.' },
            { q: 'Write a blog post about outdoor safety with useful expressions.', ar: 'اكتبي تدوينة قصيرة عن السلامة في الخارج.' }
          ]
        },
        7: {
          name: 'Trips',
          general: [
            { q: 'What different ways to travel do you know?', ar: 'ما طرق السفر المختلفة التي تعرفينها؟' },
            { q: 'What is your favorite way to travel and why?', ar: 'ما وسيلة سفرك المفضلة ولماذا؟' },
            { q: 'Would you like to travel? How would you feel?', ar: 'هل تحبين السفر؟ كيف ستشعرين؟' },
            { q: 'What is the most exciting or scariest trip you have taken?', ar: 'ما أكثر رحلة ممتعة أو مخيفة قمت بها؟' },
            { q: 'How often do you use a taxi?', ar: 'كم مرة تستخدمين التاكسي؟' },
            { q: 'What field trips have you been on?', ar: 'ما الرحلات المدرسية التي ذهبتِ إليها؟' },
            { q: 'Taxi – plane – train are ...', ar: 'Taxi وplane وtrain هي ...', expected: ['means of transportation', 'transportation'] },
            { q: 'Take off means ...', ar: 'معنى take off هو ...', expected: ['to go up in the sky', 'depart', 'إقلاع'] }
          ],
          vocab: [
            { q: "What does 'take off' mean?", ar: 'ما معنى take off؟', expected: ['to go up in the sky', 'depart', 'إقلاع'] },
            { q: 'Circle the odd word: security – passenger – suitcase – climbing', ar: 'اختاري الكلمة الشاذة', expected: ['climbing'] },
            { q: 'A document you need to travel abroad is _____.', ar: 'وثيقة تحتاجينها للسفر للخارج هي ...', expected: ['passport'] },
            { q: "What is the opposite of 'check in'?", ar: 'ما عكس check in؟', expected: ['check out'] },
            { q: 'Two means of transportation: ___ and ___', ar: 'اذكري وسيلتي نقل.' },
            { q: 'What does a passenger do when they first arrive at a hotel?', ar: 'ماذا يفعل الراكب عند وصوله الفندق؟', expected: ['check in'] },
            { q: 'Circle the odd word: already – we – just – yet', ar: 'اختاري الكلمة الشاذة', expected: ['we'] },
            { q: 'Match: arrive = ?', ar: 'مطابقة: arrive تعني ...', expected: ['get to a place', 'reach', 'يصل'] },
            { q: 'Write a phrasal verb that means discover information.', ar: 'اكتبي phrasal verb بمعنى يكتشف معلومات.', expected: ['find out'] },
            { q: 'Write a phrasal verb that means leave a place for rest.', ar: 'اكتبي phrasal verb بمعنى يبتعد عن المكان.', expected: ['get away'] }
          ],
          grammar: [
            { q: 'Choose: He (have / has / is) called the taxi.', ar: 'اختاري الصحيح', expected: ['has'] },
            { q: 'Make negative: You have travelled on the airplane.', ar: 'حوّلي الجملة للنفي', expected: ["you haven't travelled on the airplane", 'you have not travelled on the airplane'] },
            { q: "Fill in: The plane hasn't taken off ___ (just/already/yet)", ar: 'أكملي الكلمة الصحيحة', expected: ['yet'] },
            { q: 'Write the past participle of: speak, write, buy, fly', ar: 'اكتبي التصريف الثالث', expected: ['spoken written bought flown'] },
            { q: 'Order: plane / My / have / parents / the / tickets / bought /.', ar: 'رتبي الكلمات', expected: ['my parents have bought the plane tickets'] },
            { q: 'Correct: I have (visit) the beach before.', ar: 'صححي الكلمة', expected: ['visited'] },
            { q: 'Choose: The plane (has / have) departed.', ar: 'اختاري الصحيح', expected: ['has'] },
            { q: 'Fill in: Mom has ___ printed the tickets. (just/already/yet)', ar: 'أكملي just/already/yet', expected: ['already', 'just'] },
            { q: 'Correct: My mom (have) called the taxi.', ar: 'صححي الفعل', expected: ['has'] },
            { q: "Make affirmative: I haven't visited the beach.", ar: 'حوّلي الجملة للإثبات', expected: ['i have visited the beach'] },
            { q: 'Choose: She hasn’t packed her suitcase (just/already/yet).', ar: 'اختاري الصحيح', expected: ['yet'] },
            { q: 'Choose: The taxi has (just/yet) arrived.', ar: 'اختاري الصحيح', expected: ['just'] }
          ],
          composition: [
            { q: 'Write a short blog post about a field trip using: I have planned..., They have just..., You can..., The directions...', ar: 'اكتبي تدوينة قصيرة باستخدام العبارات المطلوبة.' },
            { q: 'Write 4-5 sentences about your trip plan in Present Perfect.', ar: 'اكتبي 4-5 جمل عن خطة رحلة بصيغة Present Perfect.' }
          ]
        }
      };

      const unitBtnEls = Array.from(document.querySelectorAll('.unit-btn'));
      const catBtnEls = Array.from(document.querySelectorAll('.cat-btn'));
      const qarea = document.getElementById('qarea');
      const chatarea = document.getElementById('chatarea');
      const input = document.getElementById('userinput');
      const hint = document.getElementById('hint');
      const sendBtn = document.getElementById('sendbtn');
      const nextBtn = document.getElementById('nextbtn');
      const correctEl = document.getElementById('correct');
      const totalEl = document.getElementById('total');

      let unit = null;
      let cat = null;
      let currentQ = null;
      let correctCount = 0;
      let totalCount = 0;

      function normalize(value) {
        return String(value)
          .toLowerCase()
          .replace(/[\u2018\u2019]/g, "'")
          .replace(/[\u201c\u201d]/g, '"')
          .replace(/[^a-z0-9\u0600-\u06ff\s\-']/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function containsAny(text, words) {
        return words.some((w) => text.includes(normalize(w)));
      }

      function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        chatarea.appendChild(div);
      }

      function highlight(btns, selected) {
        btns.forEach((b) => b.classList.toggle('active', b === selected));
      }

      function pickQuestion() {
        if (!unit || !cat) {
          return;
        }
        const pool = bank[unit][cat];
        currentQ = pool[Math.floor(Math.random() * pool.length)];
        qarea.innerHTML = `<p class="q-en">${currentQ.q}</p><p class="q-ar">${currentQ.ar}</p>`;
        chatarea.innerHTML = '';
        input.value = '';
        hint.textContent = 'اكتبي إجابتك ثم اضغطي إرسال ✨';
        sendBtn.disabled = false;
      }

      function evaluateOpenAnswer(answer, category) {
        const a = normalize(answer);

        if (category === 'composition') {
          const hasCore = containsAny(a, [
            'what i loved was',
            'the great thing about',
            'it is important to',
            'while i was',
            'you should',
            'i have planned',
            'they have just',
            'you can',
            'the directions'
          ]);
          if (hasCore && a.split(' ').length > 8) {
            return {
              ok: true,
              text: 'أحسنت! ✓\nExcellent writing! Keep your sentences clear and simple.\nممتازة! تابعي بنفس الأسلوب.'
            };
          }
          return {
            ok: false,
            text: 'تقريباً! ✓\nAdd 1-2 useful expressions from the unit.\nأضيفي تعبيرات الوحدة ثم أعيدي المحاولة.'
          };
        }

        if (category === 'general') {
          if (a.split(' ').length >= 4) {
            return {
              ok: true,
              text: 'أحسنت! ✓\nNice personal answer in English.\nإجابة جميلة، جربي إضافة سبب بسيط.'
            };
          }
          return {
            ok: false,
            text: 'تقريباً! ✓\nWrite one full sentence with a reason.\nاكتبي جملة كاملة مع سبب.'
          };
        }

        return {
          ok: false,
          text: 'تقريباً! ✓\nTry using key vocabulary from the unit.\nاستخدمي كلمات الوحدة الأساسية.'
        };
      }

      function evaluateExpected(q, answer) {
        if (!q.expected || !q.expected.length) {
          return null;
        }

        const a = normalize(answer);

        if (q.q.toLowerCase().includes('past participle of: speak, write, buy, fly')) {
          const needed = ['spoken', 'written', 'bought', 'flown'];
          return needed.every((w) => a.includes(w));
        }

        return q.expected.some((item) => {
          const e = normalize(item);
          return a === e || a.includes(e);
        });
      }

      function evaluateAnswer(questionObj, answer, category) {
        const a = normalize(answer);

        if (!a) {
          return { ok: false, text: 'حاول مرة أخرى ✗\nPlease write an answer first.\nاكتبي إجابتك أولاً.' };
        }

        if (category === 'general' || category === 'composition') {
          return evaluateOpenAnswer(answer, category);
        }

        const expectedResult = evaluateExpected(questionObj, answer);
        if (expectedResult === true) {
          const model = questionObj.expected ? questionObj.expected[0] : 'Great answer';
          return {
            ok: true,
            text: `أحسنت! ✓\nModel answer: ${model}\nإجابة صحيحة يا بطلة.`
          };
        }

        if (expectedResult === false) {
          const model = questionObj.expected ? questionObj.expected[0] : 'Check your unit notes';
          return {
            ok: false,
            text: `حاول مرة أخرى ✗\nThe correct answer is: ${model}\nراجعي القاعدة ثم أعيدي المحاولة.`
          };
        }

        return evaluateOpenAnswer(answer, category);
      }

      function handleAnswer() {
        const val = input.value.trim();
        if (!unit || !cat || !currentQ) {
          hint.textContent = 'اختاري الوحدة ونوع السؤال أولاً.';
          return;
        }

        if (!val) {
          hint.textContent = 'اكتبي إجابة أولاً.';
          return;
        }

        addMsg(val, 'student');
        input.value = '';
        totalCount += 1;
        totalEl.textContent = totalCount;

        const result = evaluateAnswer(currentQ, val, cat);
        addMsg(result.text, 'ai');

        if (result.ok) {
          correctCount += 1;
          correctEl.textContent = correctCount;
          hint.textContent = 'ممتاز! اضغطي "سؤال جديد" للمواصلة 🌟';
        } else {
          hint.textContent = 'أحسنتِ المحاولة، جربي مرة ثانية 💫';
        }
      }

      unitBtnEls.forEach((btn) => {
        btn.addEventListener('click', () => {
          unit = Number(btn.dataset.unit);
          highlight(unitBtnEls, btn);
          if (cat) {
            pickQuestion();
          } else {
            hint.textContent = 'اختاري نوع السؤال الآن.';
          }
        });
      });

      catBtnEls.forEach((btn) => {
        btn.addEventListener('click', () => {
          cat = btn.dataset.cat;
          highlight(catBtnEls, btn);
          if (unit) {
            pickQuestion();
          } else {
            hint.textContent = 'اختاري الوحدة أولاً.';
          }
        });
      });

      nextBtn.addEventListener('click', () => {
        if (!unit || !cat) {
          hint.textContent = 'اختاري الوحدة والنوع أولاً.';
          return;
        }
        pickQuestion();
      });

      sendBtn.addEventListener('click', handleAnswer);
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          handleAnswer();
        }
      });
    </script>
  </body>
</html>
